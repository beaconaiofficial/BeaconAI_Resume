workflows:
  ios-testflight:
    name: iOS - Build and publish to TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    # No `triggering:` block on purpose — this workflow is manual-trigger
    # only (via the Codemagic UI or API). This is the first iOS build for
    # this project; an unreviewed auto-publish-to-TestFlight pipeline on
    # every push isn't something to default into. Add a `triggering:`
    # block later if/when that's actually wanted.

    integrations:
      # Must exactly match the integration name in Codemagic's Team
      # integrations settings (Teams > Integrations > App Store Connect).
      app_store_connect: "BeaconAI CodeMagic"

    environment:
      # Named-reference signing, not the fetch-signing-files/App Store
      # Connect API auto-create path this workflow used before. That
      # script-based approach only ever talks to Apple's API directly — it
      # has no way to see certificates manually created in Codemagic's own
      # Code Signing Identities UI, which is a separate internal vault.
      # Since the distribution certificate ("Resume_distro") was created
      # there (the UI's own "Enter unique reference name to be used in
      # codemagic.yaml" prompt is the documented signal for this), the only
      # way to actually consume it is this named-reference block. Confirmed
      # from current Codemagic docs: distribution_type/bundle_identifier
      # and certificates/provisioning_profiles are mutually exclusive
      # within ios_signing — cannot mix a named certificate with
      # auto-fetched-by-bundle-ID profile lookup.
      #
      # provisioning_profiles below is a placeholder reference name —
      # Steven still needs to create a matching App Store provisioning
      # profile in the same Code Signing Identities UI (bound to
      # Resume_distro / the dev.getbeaconai.beaconai-resume App ID) and
      # give it this exact reference name, or update it here to whatever
      # name he actually uses.
      ios_signing:
        certificates:
          - Resume_distro
        provisioning_profiles:
          - Resume_distro_profile
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # keychain initialize / fetch-signing-files / keychain add-certificates
      # are not used with named ios_signing references — per Codemagic's
      # docs, those are "automatically fetched during the build process"
      # for this signing style. xcode-project use-profiles is still needed
      # to apply the fetched certificate/profile to the Xcode project.
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Run Flutter test suite
        script: |
          flutter test
        # No ignore_failure — a broken test suite should block the build,
        # not waste a signing/build cycle on code that's already known bad.

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # No beta_groups listed — this lands in Internal Testing (visible
        # to the app's internal App Store Connect team) rather than being
        # auto-distributed to any external tester group. Add beta_groups
        # here once there's an actual external testing group to target.
