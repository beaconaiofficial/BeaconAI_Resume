workflows:
  ios-testflight:
    name: iOS - Build and publish to TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    # No `triggering:` block on purpose — this workflow is manual-trigger
    # only (via the Codemagic UI or API). This is the first iOS build for
    # this project; an unreviewed auto-publish-to-TestFlight pipeline on
    # every push isn't something to default into. Add a `triggering:`
    # block later if/when that's actually wanted.

    integrations:
      # This name must exactly match whatever you name the App Store
      # Connect API key integration you add in Codemagic's Team
      # integrations settings (Teams > Integrations > App Store Connect).
      # "app_store_connect" is just this workflow's chosen name for it —
      # rename either side so they match.
      app_store_connect: app_store_connect

    environment:
      vars:
        BUNDLE_ID: "dev.getbeaconai.beaconai-resume"
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # Fully automatic signing via the App Store Connect API key — fetches
      # (or creates, if none exist yet) the distribution certificate and an
      # App Store provisioning profile for BUNDLE_ID directly through the
      # API integration, with nothing manually uploaded to Codemagic's own
      # Code Signing Identities UI beforehand.
      #
      # Deliberately NOT using an `ios_signing: distribution_type: ...`
      # block instead — that declares Codemagic should look for signing
      # files already uploaded to its UI, which is a different (manual)
      # signing path. Declaring both at once is a documented cause of
      # "No matching profiles found for bundle identifier ... and
      # distribution type app_store", since the two approaches conflict.
      #
      # This still requires BUNDLE_ID to already be a registered App ID
      # under Certificates, Identifiers & Profiles in the Apple Developer
      # Portal — fetch-signing-files can create a new certificate/profile
      # for an existing App ID, but does not register the App ID itself.
      - name: Set up keychain to be used for code signing
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Set up signing certificate
        script: |
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Run Flutter test suite
        script: |
          flutter test
        # No ignore_failure — a broken test suite should block the build,
        # not waste a signing/build cycle on code that's already known bad.

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # No beta_groups listed — this lands in Internal Testing (visible
        # to the app's internal App Store Connect team) rather than being
        # auto-distributed to any external tester group. Add beta_groups
        # here once there's an actual external testing group to target.
