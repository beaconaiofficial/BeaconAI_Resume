name: beaconai_resume
description: BeaconAI Resume — ATS-optimized resume builder with AI assistance.
publish_to: 'none'
version: 1.0.0+14

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # State management
  flutter_riverpod: ^2.4.9

  # Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Networking & connectivity
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  purchases_flutter: ^10.3.0

  # File handling
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  archive: ^3.4.10
  share_plus: ^7.2.2

  # PDF export & printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Ads (Free tier only)
  google_mobile_ads: ^4.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  xml: ^6.0.0
  syncfusion_flutter_pdf: ^33.2.0
  crypto: ^3.0.7
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Hive code generation
  hive_ce_generator: ^1.4.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
